<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Projectes M12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-indigo-600">Projectes M12</h1>
            <a href="enviar.html" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold hover:bg-indigo-700 shadow-lg transition-all">
                + Nou Projecte
            </a>
        </div>

        <div id="projectes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cofbagngimtwfgzpdggp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZmJhZ25naW10d2ZnenBkZ2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzAyNDIsImV4cCI6MjA5MTgwNjI0Mn0.uuXWL-UnEPfUjf7iJXUUq7MRBLLr8GA2mLwXYibk1Vk';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarProjectes() {
            const container = document.getElementById('projectes-container');
            const { data, error } = await client.from('m12').select('*').order('classe', { ascending: true });

            if (error) {
                container.innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
                return;
            }

            container.innerHTML = '';
            data.forEach(p => {
                const tags = p.serveis ? p.serveis.split(',').map(s => 
                    `<span class="bg-indigo-100 text-indigo-700 text-[10px] px-2 py-1 rounded font-bold mr-1">${s.trim()}</span>`
                ).join('') : '';

                container.innerHTML += `
                    <div class="bg-white border rounded-2xl p-6 shadow-sm flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between mb-2">
                                <span class="text-xs font-bold text-slate-400 uppercase">${p.classe} - GRUP ${p.grup}</span>
                            </div>
                            <h2 class="text-xl font-bold mb-2">${p.titol}</h2>
                            <p class="text-slate-600 text-sm mb-4 line-clamp-3">${p.resum}</p>
                            <div class="flex flex-wrap gap-1 mb-4">${tags}</div>
                        </div>
                        <div class="pt-4 border-t">
                            <p class="text-xs mb-3 italic text-slate-500">Alumnat: ${p.alumnat}</p>
                            <a href="enviar.html?c=${p.classe}&g=${p.grup}" class="block text-center w-full bg-slate-50 hover:bg-indigo-50 text-indigo-600 font-bold py-2 rounded-lg border transition-colors text-sm">
                                ✎ Editar Projecte
                            </a>
                        </div>
                    </div>
                `;
            });
        }
        carregarProjectes();
    </script>
</body>
</html>
