<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Projectes M12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
            <div>
                <h1 class="text-4xl font-black text-indigo-600">Projectes M12</h1>
                <p class="text-slate-500">Exhibició de treballs i col·laboracions</p>
            </div>
            <a href="enviar.html" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-indigo-200 transition-all transform hover:scale-105 text-center w-full md:w-auto">
                + Nou Projecte
            </a>
        </div>

        <div id="projectes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-center col-span-full py-20 text-slate-400">Carregant projectes...</p>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓ SUPABASE
        const SUPABASE_URL = 'https://cofbagngimtwfgzpdggp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZmJhZ25naW10d2ZnenBkZ2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzAyNDIsImV4cCI6MjA5MTgwNjI0Mn0.uuXWL-UnEPfUjf7iJXUUq7MRBLLr8GA2mLwXYibk1Vk';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarProjectes() {
            const container = document.getElementById('projectes-container');

            try {
                // Consulta a la taula 'm12' ordenada per ID (o created_at)
                const { data: projectes, error } = await client
                    .from('m12')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                // Netegem el contenidor
                container.innerHTML = '';

                if (projectes.length === 0) {
                    container.innerHTML = '<p class="text-center col-span-full py-20 text-slate-400">Encara no hi ha projectes publicats.</p>';
                    return;
                }

                projectes.forEach(projecte => {
                    // Gestionem les icones dels serveis (evitem errors si el camp està buit)
                    const serveisHTML = projecte.serveis 
                        ? projecte.serveis.split(',').map(s => 
                            `<span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold uppercase px-2 py-1 rounded border border-indigo-100">${s.trim()}</span>`
                          ).join('') 
                        : '';

                    // IMPORTANT: Fem servir BACKTICKS ( ` ) per poder injectar ${projecte.id}
                    container.innerHTML += `
                        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-xl transition-all flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <span class="bg-slate-100 text-slate-600 text-xs font-heavy px-2 py-1 rounded">${projecte.classe}</span>
                                    <div class="flex flex-wrap gap-1 justify-end">${serveisHTML}</div>
                                </div>
                                <h2 class="text-xl font-bold text-slate-800 mb-2">${projecte.titol}</h2>
                                <p class="text-slate-600 text-sm leading-relaxed mb-4 line-clamp-3">${projecte.resum}</p>
                            </div>
                            
                            <div class="mt-4 pt-4 border-t border-slate-50">
                                <p class="text-xs text-slate-400 mb-3">Grup: <span class="font-medium text-slate-700">${projecte.alumnes}</span></p>
                                <a href="enviar.html?id=${projecte.id}" class="block text-center w-full bg-slate-50 hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 font-bold py-2 rounded-xl border border-slate-200 hover:border-indigo-200 transition-colors text-sm">
                                    ✎ Editar / Veure més
                                </a>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                console.error("Error carregant projectes:", err);
                container.innerHTML = `<p class="text-center col-span-full text-red-500">Error en carregar les dades: ${err.message}</p>`;
            }
        }

        // Executem la funció en obrir la pàgina
        carregarProjectes();
    </script>
</body>
</html>
