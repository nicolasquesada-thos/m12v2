<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestió de Projecte - M12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex items-center justify-center">

    <div class="max-w-xl w-full bg-white shadow-2xl rounded-2xl overflow-hidden">
        <div id="header-bg" class="bg-indigo-600 p-6 text-white text-center transition-colors duration-500">
            <h1 id="form-title" class="text-2xl font-bold">Nou Projecte</h1>
            <p id="form-subtitle" class="text-indigo-100 text-sm">Registra el teu treball a la galeria</p>
        </div>

        <form id="meuForm" class="p-8 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-400 uppercase">Títol del Projecte</label>
                    <input type="text" id="titol" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500 transition-colors" placeholder="Ex: Control de Domòtica" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase">Classe</label>
                    <select id="classe" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500">
                        <option value="G1">G1</option><option value="G2">G2</option><option value="G3">G3</option>
                        <option value="G4">G4</option><option value="G5">G5</option><option value="G6">G6</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase">Grup / Alumnes</label>
                    <input type="text" id="alumnes" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500" placeholder="Ex: Grup 4 (Joan i Maria)" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase">Resum</label>
                <textarea id="resum" rows="3" class="w-full border-2 p-2 rounded-lg outline-none focus:border-indigo-500" placeholder="Explica breument què heu fet..." required></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase">Tecnologies (separades per comes)</label>
                <input type="text" id="serveis" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500" placeholder="Ex: Arduino, Python, SQL">
            </div>

            <div class="bg-amber-50 p-4 rounded-xl border border-amber-100 mt-6">
                <label id="pin-label" class="block text-sm font-bold text-amber-800 mb-1">Crea un PIN per a aquest projecte:</label>
                <input type="password" id="pin" class="w-full p-2 rounded border-amber-200 border outline-none focus:ring-2 focus:ring-amber-400" placeholder="PIN de 4 xifres" required>
                <p id="pin-help" class="text-[10px] text-amber-600 mt-1 uppercase font-bold text-center">🔐 Necessari per fer canvis en el futur</p>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg transform active:scale-95">
                Publicar Projecte
            </button>
            
            <a href="index.html" class="block text-center text-gray-400 text-sm hover:text-indigo-600 transition-colors">← Tornar a la galeria</a>
        </form>
    </div>

    <script>
        // 1. CONFIGURACIÓ
    const SUPABASE_URL = 'https://cofbagngimtwfgzpdggp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZmJhZ25naW10d2ZnenBkZ2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzAyNDIsImV4cCI6MjA5MTgwNjI0Mn0.uuXWL-UnEPfUjf7iJXUUq7MRBLLr8GA2mLwXYibk1Vk';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. DETECTAR MODE (EDICIÓ O CREACIÓ)
        const params = new URLSearchParams(window.location.search);
        const editId = params.get('id');

        // Si estem en mode edició, adaptem la interfície i carreguem dades
        if (editId) {
            document.getElementById('form-title').innerText = "Actualitzar Projecte";
            document.getElementById('form-subtitle').innerText = "Modifica les dades i confirma amb el PIN";
            document.getElementById('header-bg').classList.replace('bg-indigo-600', 'bg-emerald-600');
            document.getElementById('btnSubmit').classList.replace('bg-indigo-600', 'bg-emerald-600');
            document.getElementById('btnSubmit').innerText = "Guardar Canvis";
            document.getElementById('pin-label').innerText = "Escriu el PIN per confirmar:";

            async function carregarDades() {
                const { data, error } = await client.from('m12').select('*').eq('id', editId).maybeSingle();
                if (data) {
                    document.getElementById('titol').value = data.titol;
                    document.getElementById('classe').value = data.classe;
                    document.getElementById('alumnes').value = data.alumnes;
                    document.getElementById('resum').value = data.resum;
                    document.getElementById('serveis').value = data.serveis;
                } else {
                    alert("No s'ha trobat el projecte.");
                    window.location.href = "index.html";
                }
            }
            carregarDades();
        }

        // 3. ENVIAMENT I VALIDACIÓ
        document.getElementById('meuForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "Processant...";

            const dades = {
                titol: document.getElementById('titol').value,
                classe: document.getElementById('classe').value,
                alumnes: document.getElementById('alumnes').value,
                resum: document.getElementById('resum').value,
                serveis: document.getElementById('serveis').value,
                pin: document.getElementById('pin').value
            };

            try {
                if (editId) {
                    // --- MODE EDICIÓ ---
                    // Validem primer el PIN contra la base de dades
                    const { data: projecte } = await client.from('m12').select('pin').eq('id', editId).single();
                    
                    if (projecte.pin !== dades.pin) {
                        alert("❌ PIN incorrecte. No s'ha pogut guardar.");
                    } else {
                        const { error } = await client.from('m12').update(dades).eq('id', editId);
                        if (error) throw error;
                        alert("✅ Projecte actualitzat amb èxit!");
                        window.location.href = "index.html";
                    }
                } else {
                    // --- MODE NOU ---
                    // Validem que no existeixi el grup a la mateixa classe
                    const { data: existent } = await client.from('m12')
                        .select('id')
                        .eq('classe', dades.classe)
                        .eq('alumnes', dades.alumnes)
                        .maybeSingle();

                    if (existent) {
                        alert("⚠️ Aquest grup ja té un projecte a " + dades.classe + ". Busca'l a la galeria per editar-lo.");
                    } else {
                        const { error } = await client.from('m12').insert([dades]);
                        if (error) throw error;
                        alert("🚀 Projecte publicat!");
                        window.location.href = "index.html";
                    }
                }
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = editId ? "Guardar Canvis" : "Publicar Projecte";
            }
        };
    </script>
</body>
</html>
