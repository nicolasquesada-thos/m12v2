
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Gestió Projecte M12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-lg w-full bg-white shadow-xl rounded-2xl overflow-hidden">
        <div id="header-bg" class="bg-indigo-600 p-6 text-white text-center">
            <h1 id="form-title" class="text-2xl font-bold">Nou Projecte</h1>
            <p id="form-subtitle" class="text-indigo-100 text-sm">Emplena tots els camps</p>
        </div>

        <form id="meuForm" class="p-8 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase">Classe</label>
                    <select id="classe" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500">
                        <option>G1</option><option>G2</option><option>G3</option>
                        <option>G4</option><option>G5</option><option>G6</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase">Número Grup</label>
                    <input type="number" id="grup" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500" placeholder="Ex: 4" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase">Títol</label>
                <input type="text" id="titol" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500" required>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase">Alumnat (Noms)</label>
                <input type="text" id="alumnat" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500" required>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase">Resum</label>
                <textarea id="resum" rows="3" class="w-full border-2 p-2 rounded-lg outline-none focus:border-indigo-500" required></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase">Serveis (comes)</label>
                <input type="text" id="serveis" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500">
            </div>

            <div class="bg-amber-50 p-4 rounded-xl border border-amber-100">
                <label class="block text-sm font-bold text-amber-800 mb-1">PIN de Seguretat:</label>
                <input type="password" id="pin" class="w-full p-2 rounded border-amber-200 outline-none" required>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg transition-all">
                Publicar Projecte
            </button>
            <a href="index.html" class="block text-center text-gray-400 text-xs mt-4">Tornar a la galeria</a>
        </form>
    </div>

    <script>
    const SUPABASE_URL = 'https://cofbagngimtwfgzpdggp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZmJhZ25naW10d2ZnenBkZ2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzAyNDIsImV4cCI6MjA5MTgwNjI0Mn0.uuXWL-UnEPfUjf7iJXUUq7MRBLLr8GA2mLwXYibk1Vk';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const editC = params.get('c'); // classe
        const editG = params.get('g'); // grup

        if (editC && editG) {
            document.getElementById('form-title').innerText = "Editar Projecte";
            document.getElementById('header-bg').classList.replace('bg-indigo-600', 'bg-emerald-600');
            document.getElementById('btnSubmit').classList.replace('bg-indigo-600', 'bg-emerald-600');
            document.getElementById('btnSubmit').innerText = "Desar Canvis";
            
            async function carregar() {
                const { data } = await client.from('m12').select('*').eq('classe', editC).eq('grup', editG).maybeSingle();
                if (data) {
                    document.getElementById('classe').value = data.classe;
                    document.getElementById('grup').value = data.grup;
                    document.getElementById('titol').value = data.titol;
                    document.getElementById('alumnat').value = data.alumnat;
                    document.getElementById('resum').value = data.resum;
                    document.getElementById('serveis').value = data.serveis;
                    // Bloquegem la clau primària per evitar errors de duplicats en editar
                    document.getElementById('classe').disabled = true;
                    document.getElementById('grup').disabled = true;
                }
            }
            carregar();
        }

        document.getElementById('meuForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;

            const dades = {
                classe: document.getElementById('classe').value,
                grup: document.getElementById('grup').value,
                titol: document.getElementById('titol').value,
                alumnat: document.getElementById('alumnat').value,
                resum: document.getElementById('resum').value,
                serveis: document.getElementById('serveis').value,
                pin: document.getElementById('pin').value
            };

            try {
                if (editC && editG) {
                    // MODE EDICIÓ: Primer comprovem PIN
                    const { data } = await client.from('m12').select('pin').eq('classe', editC).eq('grup', editG).single();
                    if (data.pin !== dades.pin) {
                        alert("❌ PIN Incorrecte");
                    } else {
                        const { error } = await client.from('m12').update(dades).eq('classe', editC).eq('grup', editG);
                        if (error) throw error;
                        alert("✅ Actualitzat!");
                        window.location.href = "index.html";
                    }
                } else {
                    // MODE NOU
                    const { error } = await client.from('m12').insert([dades]);
                    if (error) {
                        if (error.code === '23505') alert("⚠️ Aquesta classe i grup ja existeixen!");
                        else throw error;
                    } else {
                        alert("🚀 Publicat!");
                        window.location.href = "index.html";
                    }
                }
            } catch (err) { alert("Error: " + err.message); }
            finally { btn.disabled = false; }
        };
    </script>
</body>
</html>
