<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Gestió de Projecte - M12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex items-center justify-center">

    <div class="max-w-xl w-full bg-white shadow-2xl rounded-2xl overflow-hidden">
        <div id="header-color" class="bg-indigo-600 p-6 text-white text-center">
            <h1 id="form-title" class="text-2xl font-bold">Nou Projecte</h1>
            <p id="form-subtitle" class="text-indigo-100 text-sm">Introdueix les dades i un PIN de seguretat</p>
        </div>

        <form id="meuForm" class="p-8 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-400 uppercase">Títol</label>
                    <input type="text" id="titol" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase">Classe</label>
                    <select id="classe" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500">
                        <option>G1</option><option>G2</option><option>G3</option><option>G4</option><option>G5</option><option>G6</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase">Alumnes</label>
                    <input type="text" id="alumnes" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase">Resum</label>
                <textarea id="resum" rows="3" class="w-full border-2 p-2 rounded-lg outline-none focus:border-indigo-500" required></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase">Serveis (separats per comes)</label>
                <input type="text" id="serveis" class="w-full border-b-2 p-2 outline-none focus:border-indigo-500" placeholder="Ex: Web, API, DB">
            </div>

            <div class="bg-amber-50 p-4 rounded-xl border border-amber-100">
                <label id="pin-label" class="block text-sm font-bold text-amber-800 mb-1">Crea un PIN de seguretat:</label>
                <input type="password" id="pin" class="w-full p-2 rounded border-amber-200 border outline-none focus:ring-2 focus:ring-amber-400" placeholder="Ex: 1234" required>
                <p class="text-xs text-amber-600 mt-1">Necessitaràs aquest PIN per modificar el projecte més endavant.</p>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg">
                Publicar Projecte
            </button>
            
            <a href="index.html" class="block text-center text-gray-400 text-sm hover:text-indigo-600">Torna enrere</a>
        </form>
    </div>

    <script>
    // 1. Connexió amb Supabase
    const SUPABASE_URL = 'https://cofbagngimtwfgzpdggp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZmJhZ25naW10d2ZnenBkZ2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzAyNDIsImV4cCI6MjA5MTgwNjI0Mn0.uuXWL-UnEPfUjf7iJXUUq7MRBLLr8GA2mLwXYibk1Vk';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. Detectar si estem EDITANT o CREANT
    const params = new URLSearchParams(window.location.search);
    const editId = params.get('id');

    // 3. Si hi ha ID, carregar les dades actuals al formulari
    if (editId) {
        async function carregarDades() {
            const { data } = await client.from('m12').select('*').eq('id', editId).single();
            if (data) {
                document.getElementById('titol').value = data.titol;
                document.getElementById('classe').value = data.classe;
                document.getElementById('alumnes').value = data.alumnes;
                document.getElementById('resum').value = data.resum;
                document.getElementById('serveis').value = data.serveis;
                // El PIN no el carreguem per seguretat, l'hauran de posar de nou
            }
        }
        carregarDades();
    }

    // 4. LA LÒGICA DE VALIDACIÓ I ENVIAMENT
    document.getElementById('meuForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "Validant dades...";

        const dades = {
            titol: document.getElementById('titol').value,
            classe: document.getElementById('classe').value,
            alumnes: document.getElementById('alumnes').value,
            resum: document.getElementById('resum').value,
            serveis: document.getElementById('serveis').value,
            pin: document.getElementById('pin').value
        };

        if (editId) {
            // --- LÒGICA PER ACTUALITZAR ---
            // Primer comprovem si el PIN és correcte
            const { data: projecte } = await client.from('m12').select('pin').eq('id', editId).single();
            
            if (projecte.pin !== dades.pin) {
                alert("❌ PIN incorrecte. No pots modificar aquest projecte.");
                btn.disabled = false;
                btn.innerText = "Guardar Canvis";
                return;
            }

            const { error } = await client.from('m12').update(dades).eq('id', editId);
            if (!error) alert("✅ Actualitzat correctament!");
            
        } else {
            // --- LÒGICA PER CREAR NOU ---
            // Validem que no existeixi el grup a la classe
            const { data: existent } = await client.from('m12')
                .select('id')
                .eq('classe', dades.classe)
                .eq('alumnes', dades.alumnes)
                .maybeSingle();

            if (existent) {
                alert("⚠️ Aquest grup ja té un projecte a " + dades.classe + ". Busca'l a la galeria per editar-lo.");
                btn.disabled = false;
                btn.innerText = "Publicar Projecte";
                return;
            }

            const { error } = await client.from('m12').insert([dades]);
            if (!error) alert("🚀 Projecte creat amb èxit!");
        }

        window.location.href = "index.html";
    };
</script>
</body>
</body>
</html>
